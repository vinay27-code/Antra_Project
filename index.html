<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">

    <section class="head">
      <div>
        <h1>Todo List</h1>
      </div>

      <form id="todoForm" class="add-bar">
        <input
          id="todoInput"
          type="text"
          placeholder="Add new task..."
        />
        <button type="submit">Submit</button>
      </form>
    </section>

    <section class="grid">

      <article class="box">
        <h2>Pending Tasks (<span id="pendCount">0</span>)</h2>
        <ul id="pendList" class="list"></ul>
      </article>

      <article class="box">
        <h2>Completed Tasks (<span id="doneCount">0</span>)</h2>
        <ul id="doneList" class="list"></ul>
      </article>

    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
